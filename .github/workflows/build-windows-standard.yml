name: Build Windows Standard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-windows-standard.yml'
      - 'build_windows_standard.bat'
      - 'generate_windows_icon.py'
      - 's3_copy_desktop_app/**'
      - 's3_copy_desktop_app_launcher.py'
      - 's3organizer_mango_1024.png'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Build Windows distribution
        shell: cmd
        run: build_windows_standard.bat

      - name: Upload Windows folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3Organizer-windows-folder
          path: dist/s3Organizer
          if-no-files-found: error

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: s3Organizer-windows-zip
          path: dist/s3Organizer-windows.zip
          if-no-files-found: error
